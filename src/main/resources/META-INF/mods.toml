modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
authors = "${mod_authors}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
# Jar-root logo. Used both by Forge's mod list AND by Embeddium's options GUI: Embeddium's
# TabHeaderWidget resolves a section's mod logo from this same logoFile (via the Forge ModContainer),
# so the "Foxy" section in Video Settings shows this icon too.
logoFile = "icon.png"
logoBlur = false
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Embeddium (Sodium fork for Forge 1.20.1). Mandatory on the client because
# foxy's renderer is built on top of Sodium's RenderSection / RenderRegionManager.
[[dependencies."${mod_id}"]]
modId = "embeddium"
mandatory = false
versionRange = "[0.3,1.0)"
ordering = "BEFORE"
side = "CLIENT"

# Oculus (Iris fork for Forge 1.20.1). Optional — only needed when shaders are loaded.
[[dependencies."${mod_id}"]]
modId = "oculus"
mandatory = false
versionRange = "[1.6,2.0)"
ordering = "BEFORE"
side = "CLIENT"
